name: Confluence MCP Server Setup Automation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/confluence-setup.yml'

jobs:
  setup-confluence-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed if Copilot is to make changes to the repo
      # Add 'copilot-requests' permission if you want to track usage and spend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Authenticate Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.secrets.COPILOT_PAT }} # Use a fine-grained PAT with 'Copilot Requests' permission
        run: |
          echo "Authentication complete" # The env var handles authentication automatically

      - name: Run Copilot CLI to manage Confluence configuration
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.secrets.COPILOT_PAT }}
          # Pass Confluence details as secrets for security
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          # Use the 'copilot' CLI in programmatic mode to interact with a Confluence setup script or configuration file
          copilot -p "Ensure the confluence-config.yml file is correctly set up with the provided URL, username, and API token for the MCP server." --autopilot --yolo
