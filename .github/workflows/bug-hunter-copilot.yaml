name: Bug Hunter Copilot Workflow

on:
   # Manual trigger in GitHub Actions UI
  workflow_dispatch:

  repository_dispatch:
    types: [bug-ticket-created]


jobs:
  run-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install GitHub CLI
        run: sudo apt install gh -y

      - name: Install Copilot CLI
        run: gh extension install github/copilot-cli

      - name: Install Bug Hunter Plugin
        run: gh copilot plugin install ./copilot-plugin

      - name: Run Copilot Agent
        run: gh copilot plugin run bug-hunter-plugin --agent bug-hunter-agent --args "ticket_id=${{ github.event.client_payload.ticket_id }}"
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}

