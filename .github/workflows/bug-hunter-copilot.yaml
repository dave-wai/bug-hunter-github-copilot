name: Bug Hunter Copilot Workflow

on:
  workflow_dispatch:
  repository_dispatch:
    types: [bug-ticket-created]

jobs:
  run-copilot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh

      - name: Install Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Verify copilot installed
        run: copilot --version

      - name: Install Bug Hunter Plugin
        run: copilot plugin install ./copilot-plugin

      - name: Run Copilot Agent
        run: |
          copilot plugin run bug-hunter-plugin --agent bug-hunter-agent "${{ github.event.client_payload.ticket_id }}"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
