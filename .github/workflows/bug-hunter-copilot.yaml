name: Bug Hunter Copilot Workflow

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket id (optional) for manual runs, e.g. PROJ-123'
        required: false
  repository_dispatch:
    types: [bug-ticket-created]

jobs:
  run-copilot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPILOT_PAT }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh curl

      - name: Install Copilot CLI
        run: curl -fsSL https://gh.io/copilot-install | bash

      - name: Install Bug Hunter Plugin
        run: copilot plugin install ./copilot-plugin

      - name: Run Copilot Agent
        run: |
          set -euo pipefail

          # Resolve ticket id (priority: repository_dispatch.client_payload.ticket_id, client_payload.issue.key, workflow_dispatch input, env override)
          TICKET_ID="${{ github.event.client_payload.ticket_id || github.event.client_payload.issue.key || github.event.inputs.ticket_id || env.TICKET_ID_OVERRIDE || '' }}"

          echo "Resolved TICKET_ID: '$TICKET_ID'"

          if [ -z "$TICKET_ID" ]; then
            echo "ERROR: ticket_id is empty. For manual runs provide it in the 'Run workflow' input. For API runs include it in client_payload.issue.key or client_payload.ticket_id."
            exit 1
          fi

          copilot plugin run bug-hunter-plugin --agent bug-hunter-agent "$TICKET_ID"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
