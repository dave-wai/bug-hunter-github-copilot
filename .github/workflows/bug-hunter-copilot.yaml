name: Confluence MCP Server Setup Automation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/confluence-setup.yml'

jobs:
  setup-confluence-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Verify Copilot token is available (no secrets printed)
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          # do not print the token; just fail if missing
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "Error: COPILOT_GITHUB_TOKEN is not set. Make sure repository secret COPILOT_PAT exists."
            exit 1
          else
            echo "COPILOT_GITHUB_TOKEN present (not shown)."
          fi

      - name: Authenticate Copilot CLI (noop if CLI auto-uses env)
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          # Some versions of the CLI will use COPILOT_GITHUB_TOKEN automatically.
          # You can optionally run a harmless check that doesn't expose the token:
          node -e "console.log(process.env.COPILOT_GITHUB_TOKEN ? 'env set' : 'missing')"

      - name: Run Copilot CLI to manage Confluence configuration
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          # Use the 'copilot' CLI in programmatic mode.
          # Be careful with --autopilot or --yolo flags (they can make large changes).
          copilot -p "Ensure the confluence-config.yml file is correctly set up with the provided URL, username, and API token for the MCP server." --autopilot
